name: Deploy Pages

on:
  pull_request:
    paths:
      - 'box/teams/**'
      - 'box/blog/**'
      - 'box/site.config.json'
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  push:
    branches: [main]
    paths:
      - 'box/teams/**'
      - 'box/blog/**'
      - 'box/site.config.json'
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # GitHub Pages がそもそも有効化されていない repo (upstream pkdxtools/pkdx 等)
  # で deploy を走らせないためのゲート。Fork 側で Settings → Pages → Source を
  # "GitHub Actions" に切り替えた時点で pages-enabled が true になる。
  # `box/site.config.json` の enabled フィールドは二次ゲート（一時停止したい
  # ユーザー向け）。両方 true のときだけ Pages アーティファクトを作る。
  preflight:
    name: Resolve deploy gates
    runs-on: ubuntu-latest
    outputs:
      pages-enabled: ${{ steps.check.outputs.pages-enabled }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          pages_api=false
          if gh api "repos/${GITHUB_REPOSITORY}/pages" > /dev/null 2>&1; then
            pages_api=true
          else
            echo "::notice::GitHub Pages is not enabled for ${GITHUB_REPOSITORY}. Deploy will be skipped. Enable it under Settings → Pages → Source: GitHub Actions."
          fi

          config_enabled=true
          if [ -f box/site.config.json ]; then
            if jq -e '.enabled == false' box/site.config.json > /dev/null 2>&1; then
              config_enabled=false
              echo "::notice::box/site.config.json has enabled=false. Deploy will be skipped."
            fi
          fi

          if [ "$pages_api" = "true" ] && [ "$config_enabled" = "true" ]; then
            echo "pages-enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "pages-enabled=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build site (always)
    runs-on: ubuntu-22.04
    needs: preflight
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # publishedAt を git log から解決するため全履歴を取得する
          fetch-depth: 0
      # astro check は Node.js ランタイム上で走る (bun ではなく node を要求する)。
      # Astro 6 系の要求は >=22.12 なので setup-node で揃える。
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.12.0'
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12
      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile
      - name: Unit tests
        working-directory: site
        run: bun test
      - name: Type check
        working-directory: site
        # `bunx` は runtime fetch (サプライチェーン攻撃の表面積を広げる)。
        # `bun run check` なら `bun install --frozen-lockfile` で node_modules に
        # 固定された astro@6.1.8 の binstub が呼ばれる。
        run: bun run check
      - name: Build smoke test (fixtures)
        working-directory: site
        run: bun run smoke
      - name: Build production site
        working-directory: site
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          SITE_BASE: /${{ github.event.repository.name }}
        run: bun run build
      # 常にプレビュー用アーティファクトを上げる。upstream の PR でもブログ
      # 生成結果をメンテナーがダウンロードして確認できるようにする。
      - name: Upload site dist (preview)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-dist
          path: site/dist
          retention-days: 7
      # Pages にデプロイするときだけ専用 artifact を別途作る。
      # main への push、または workflow_dispatch (任意 branch の手動 deploy) で発火。
      - name: Upload Pages artifact
        if: needs.preflight.outputs.pages-enabled == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    if: needs.preflight.outputs.pages-enabled == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    needs: [preflight, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
