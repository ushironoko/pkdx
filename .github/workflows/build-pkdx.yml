name: Build pkdx binaries

on:
  push:
    tags: ['v*']
  # Pre-merge validation path: maintainers can dispatch manually on a branch
  # to exercise the Windows vcpkg/OpenBLAS toolchain before tagging a release.
  # The release job is gated to tag pushes so manual runs only build & test.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            binary: pkdx-darwin-arm64
          - os: ubuntu-22.04
            target: linux-x86_64
            binary: pkdx-linux-x86_64
          - os: windows-2022
            target: windows-x86_64
            binary: pkdx-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Install BLAS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev

      - name: Cache vcpkg installed (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-openblas-x64-mingw-dynamic-v1
          restore-keys: |
            vcpkg-openblas-x64-mingw-dynamic-

      - name: Install BLAS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Use the MinGW-targeted triplet so the produced libopenblas.dll.a /
          # libopenblas.dll match the MinGW gcc.exe used in Build/Test below.
          # `x64-windows` would be the MSVC `cl.exe` target — mixing it with
          # MinGW gcc gives an unsupported ABI/import-lib mismatch (see
          # https://learn.microsoft.com/en-us/vcpkg/users/platforms/mingw).
          # vcpkg's MinGW triplet build needs gcc/g++ on PATH at install time
          # (it autodetects the toolchain via PATH), so prepend the runner's
          # mingw-w64 bin dir before invoking vcpkg.
          $env:PATH = "C:\mingw64\bin;$env:PATH"
          C:\vcpkg\vcpkg.exe install openblas:x64-mingw-dynamic
          # Add OpenBLAS DLL dir to PATH for runtime resolution during moon test.
          Add-Content $env:GITHUB_PATH "C:\vcpkg\installed\x64-mingw-dynamic\bin"

      - name: Configure MoonBit compiler (Windows)
        # MoonBit's native backend reads MOON_CC for compiler override (NOT the
        # conventional CC); without it, auto-detection picks cl.exe (MSVC) on
        # Windows, which would reject the GCC-style `-L/-l` link flags below.
        # windows-2022 runners install mingw-w64 GCC at C:\mingw64\bin\gcc.exe
        # (Install-Mingw64.ps1). Pin the absolute path so resolution does not
        # depend on PATH state — Git Bash inherits the machine PATH but a
        # future image change could move mingw under MSYS2 and silently break
        # `MOON_CC=gcc`.
        # Setting MOON_CC must be Windows-only: MoonBit treats any present
        # MOON_CC as an explicit override and parses the value, so an empty
        # string trips `failed to parse cc from env MOON_CC` on Linux/macOS.
        # Writing to $GITHUB_ENV from a runner.os == 'Windows' step keeps the
        # variable absent on the other matrix legs.
        if: runner.os == 'Windows'
        shell: bash
        run: echo "MOON_CC=C:/mingw64/bin/gcc.exe" >> "$GITHUB_ENV"

      - name: Build
        working-directory: pkdx
        env:
          MOON_CC_LINK_FLAGS: ${{ runner.os == 'Linux' && '-lopenblas -llapack -lm' || (runner.os == 'macOS' && '-framework Accelerate' || (runner.os == 'Windows' && '-LC:/vcpkg/installed/x64-mingw-dynamic/lib -lopenblas' || '')) }}
        run: |
          moon update
          moon build --target native src/main
        shell: bash

      - name: Test
        working-directory: pkdx
        env:
          MOON_CC_LINK_FLAGS: ${{ runner.os == 'Linux' && '-lopenblas -llapack -lm' || (runner.os == 'macOS' && '-framework Accelerate' || (runner.os == 'Windows' && '-LC:/vcpkg/installed/x64-mingw-dynamic/lib -lopenblas' || '')) }}
        run: |
          moon test --target native
        shell: bash

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: cp pkdx/_build/native/debug/build/src/main/main.exe ${{ matrix.binary }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "pkdx\_build\native\debug\build\src\main\main.exe" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    # Only publish a release on tag pushes. Gate on event_name as well so a
    # manual workflow_dispatch on a tag ref (e.g. re-running an old release)
    # does not silently re-publish.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "pkdx ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/pkdx-darwin-arm64/pkdx-darwin-arm64 \
            artifacts/pkdx-linux-x86_64/pkdx-linux-x86_64 \
            artifacts/pkdx-windows-x86_64.exe/pkdx-windows-x86_64.exe
